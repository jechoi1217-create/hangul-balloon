<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한글 풍선 게임</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--deep:#0f1e3d;--mint:#3ecfbf;--gold:#ffd93d;--green:#58c96a;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;}
body{background:linear-gradient(160deg,#c5e3ff 0%,#dff0ff 45%,#d5f5ef 100%);}
.star-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--dl,0s);}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.85;transform:scale(1.5)}}
.cloud{position:fixed;pointer-events:none;z-index:1;}
.cloud-a{top:5%;animation:dR 65s linear infinite;}
.cloud-b{top:16%;animation:dR 85s linear infinite 18s;opacity:.6;}
.cloud-c{top:3%;animation:dL 72s linear infinite 6s;}
@keyframes dR{from{left:-340px}to{left:110vw}}
@keyframes dL{from{right:-340px}to{right:110vw}}
#startScreen,#gameScreen,#resultScreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;}
.hidden{display:none!important;}
#startScreen{background:transparent;}
.logo-wrap{text-align:center;margin-bottom:18px;animation:floatY 3s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.logo-title{font-family:'Gaegu',cursive;font-size:clamp(2.6rem,8vw,4.8rem);font-weight:700;letter-spacing:5px;
  background:linear-gradient(160deg,#1a4faa,#1eaaa0,#6040c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 5px 0 rgba(30,170,160,.18));}
.logo-sub{font-size:clamp(.85rem,2.5vw,1.05rem);color:#4a6e8a;margin-top:6px;}
.card{background:rgba(255,255,255,.82);backdrop-filter:blur(20px);border-radius:28px;padding:24px 28px;
  max-width:500px;width:92%;border:1.5px solid rgba(255,255,255,.75);
  box-shadow:0 4px 0 rgba(180,210,240,.6),0 8px 36px rgba(74,111,165,.13),inset 0 1px 0 #fff;}
.slabel{font-size:.7rem;font-weight:700;letter-spacing:2px;color:#7ca0c0;text-transform:uppercase;margin-bottom:9px;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.cat-btn{border:2px solid rgba(180,210,240,.55);background:linear-gradient(145deg,rgba(245,251,255,.95),rgba(225,240,255,.88));
  border-radius:13px;padding:11px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;
  font-family:'Noto Sans KR',sans-serif;box-shadow:0 3px 0 rgba(160,200,235,.5),inset 0 1px 0 #fff;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.cat-btn:hover{transform:translateY(-2px);}
.cat-btn.active{border-color:var(--mint);background:linear-gradient(145deg,#4eddd3,#2aaaa0);color:#fff;
  box-shadow:0 4px 0 rgba(30,140,132,.6),0 8px 18px rgba(62,207,191,.4),inset 0 1px 0 rgba(255,255,255,.35);
  transform:translateY(-2px);}
.cat-icon{font-size:1.85rem;}
.cat-name{font-size:.74rem;font-weight:700;}
.diff-row{display:flex;gap:8px;margin-bottom:16px;}
.diff-btn{flex:1;border:2px solid rgba(180,210,240,.55);background:linear-gradient(145deg,rgba(245,251,255,.95),rgba(225,240,255,.88));
  border-radius:12px;padding:10px 5px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.78rem;font-weight:700;color:#5a7a9a;
  box-shadow:0 3px 0 rgba(160,200,235,.45),inset 0 1px 0 #fff;transition:all .2s;}
.diff-btn:hover{transform:translateY(-2px);}
.diff-btn.active{background:linear-gradient(145deg,#68bfff,#3a8fe0);border-color:#5aadff;color:#fff;
  box-shadow:0 4px 0 rgba(30,100,190,.5),0 7px 16px rgba(90,173,255,.4);transform:translateY(-2px);}
.lv-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.lv-btn{flex:1;min-width:54px;border:2.5px solid rgba(160,200,235,.55);border-radius:13px;padding:10px 4px 8px;
  cursor:pointer;font-family:'Gaegu',cursive;display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.lv-num{font-size:1.2rem;font-weight:900;line-height:1;}
.lv-stars{font-size:.85rem;line-height:1;}
.lv-req{font-size:.7rem;font-weight:700;line-height:1;}
.lv-btn.locked{background:linear-gradient(145deg,rgba(225,230,242,.9),rgba(210,218,235,.85));color:#7a88aa;cursor:not-allowed;
  box-shadow:0 3px 0 rgba(150,165,195,.38),inset 0 1px 0 #fff;position:relative;}
.lv-btn.locked::after{content:'🔒';position:absolute;top:3px;right:4px;font-size:.7rem;opacity:.72;}
.lv-btn.locked .lv-num,.lv-btn.locked .lv-req{color:#7a88aa;}
.lv-btn.unlocked{background:linear-gradient(145deg,rgba(240,250,255,.97),rgba(218,238,255,.92));color:#1a4080;
  box-shadow:0 4px 0 rgba(140,190,230,.48),inset 0 1px 0 #fff;}
.lv-btn.unlocked .lv-num{color:#1a4080;font-size:1.25rem;}
.lv-btn.unlocked .lv-req{color:#2860a0;}
.lv-btn.unlocked:hover{transform:translateY(-2px);}
.lv-btn.selected{border-color:var(--mint);background:linear-gradient(145deg,#4eddd3,#2aada0);color:#fff;
  box-shadow:0 4px 0 rgba(20,140,132,.58),0 7px 16px rgba(62,207,191,.42),inset 0 1px 0 rgba(255,255,255,.38);
  transform:translateY(-2px);}
.lv-btn.selected .lv-num,.lv-btn.selected .lv-req{color:#fff;}
.best-badge{display:inline-flex;align-items:center;gap:5px;font-family:'Gaegu',cursive;font-size:.9rem;font-weight:700;
  color:#5a3200;background:linear-gradient(135deg,#ffe566,#ffcc00);border-radius:10px;padding:4px 12px;margin-bottom:9px;
  box-shadow:0 3px 0 rgba(180,130,0,.4);}
.start-btn{width:100%;padding:14px;border:none;border-radius:18px;margin-top:14px;
  background:linear-gradient(145deg,#6dd97a,#3aaa4e);color:#fff;font-family:'Gaegu',cursive;font-size:1.5rem;font-weight:700;cursor:pointer;
  letter-spacing:3px;box-shadow:0 6px 0 rgba(30,120,50,.5),0 9px 24px rgba(88,201,106,.42),inset 0 1px 0 rgba(255,255,255,.35);
  transition:all .18s cubic-bezier(.34,1.56,.64,1);}
.start-btn:hover{transform:translateY(-3px);}
.start-btn:active{transform:translateY(2px);}
#gameScreen{flex-direction:column;justify-content:flex-start;background:transparent;}
.hdr{width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 13px;
  background:rgba(255,255,255,.72);backdrop-filter:blur(14px);border-bottom:1.5px solid rgba(255,255,255,.6);z-index:20;}
.hl{display:flex;align-items:center;gap:8px;}
.score-box{background:linear-gradient(145deg,#ffe055,#f5b800);border-radius:12px;padding:5px 13px;
  font-weight:900;font-size:1.05rem;color:#4a3000;box-shadow:0 3px 0 rgba(190,140,0,.38),inset 0 1px 0 rgba(255,255,255,.48);}
.lives-box{display:flex;gap:3px;align-items:center;}
.heart{font-size:1.3rem;display:inline-block;transform-origin:center;}
.heart.pulse{animation:hrtP .5s cubic-bezier(.34,1.9,.64,1);}
@keyframes hrtP{0%{transform:scale(1)}40%{transform:scale(1.8)}70%{transform:scale(.88)}100%{transform:scale(1)}}
.wrong-counter{display:flex;gap:3px;align-items:center;}
.wrong-dot{width:11px;height:11px;border-radius:50%;background:rgba(200,80,80,.18);border:1.5px solid rgba(200,80,80,.3);transition:all .3s;}
.wrong-dot.on{background:#e84040;border-color:#c03030;box-shadow:0 0 6px rgba(232,64,64,.5);}
.spd-box{font-size:.66rem;font-weight:700;letter-spacing:1.5px;color:#6a90b0;background:rgba(255,255,255,.7);
  border-radius:9px;padding:4px 9px;border:1px solid rgba(180,210,240,.5);}
.hr{display:flex;align-items:center;gap:6px;}
.icon-btn{border:1.5px solid rgba(180,210,240,.5);background:linear-gradient(145deg,rgba(250,253,255,.9),rgba(230,244,255,.88));
  border-radius:10px;padding:6px 12px;cursor:pointer;font-size:.82rem;font-weight:700;color:#4a6e8a;
  font-family:'Noto Sans KR',sans-serif;white-space:nowrap;
  box-shadow:0 2px 0 rgba(160,200,235,.42),inset 0 1px 0 #fff;transition:all .15s;}
.icon-btn:hover{transform:translateY(-2px);}
#gameArea{flex:1;width:100%;position:relative;overflow:hidden;}
.ground{position:absolute;bottom:0;left:0;right:0;height:75px;
  background:linear-gradient(to top,rgba(110,195,125,.22),transparent);pointer-events:none;z-index:5;}
#targetArea{position:absolute;bottom:85px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:7px;z-index:15;pointer-events:none;width:100%;}
#targetImage{width:clamp(88px,17vw,124px);height:clamp(88px,17vw,124px);border-radius:20px;
  background:linear-gradient(145deg,rgba(255,255,255,.97),rgba(235,248,255,.9));
  display:flex;align-items:center;justify-content:center;font-size:clamp(3rem,8.5vw,5rem);
  box-shadow:0 5px 0 rgba(160,200,235,.48),0 8px 22px rgba(0,0,0,.08),inset 0 1px 0 #fff;
  border:2.5px solid rgba(255,255,255,.9);}
#targetWord{display:flex;gap:7px;align-items:center;}
.char-slot{width:clamp(42px,10.5vw,62px);height:clamp(42px,10.5vw,62px);border-radius:12px;
  background:linear-gradient(145deg,rgba(255,255,255,.92),rgba(228,242,255,.85));
  border:2.5px dashed rgba(145,195,230,.8);display:flex;align-items:center;justify-content:center;
  font-size:clamp(1.3rem,3.8vw,2rem);font-weight:900;color:var(--deep);
  box-shadow:0 4px 0 rgba(155,200,235,.42),inset 0 1px 0 #fff;transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative;}
.char-slot:not(.complete):not(.filled)::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;background:rgba(160,200,230,.45);}
.char-slot.filled{border-color:rgba(62,207,191,.65);background:linear-gradient(145deg,rgba(215,250,248,.97),rgba(195,238,235,.88));}
.char-slot.complete{border:2.5px solid rgba(88,201,106,.7);background:linear-gradient(145deg,rgba(215,248,225,.97),rgba(195,235,210,.88));color:var(--green);animation:slotPop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes slotPop{0%{transform:scale(.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
#progressBar{display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;margin-top:2px;}
#progressBarInner{display:flex;gap:4px;align-items:center;background:rgba(255,255,255,.82);backdrop-filter:blur(8px);
  border-radius:14px;padding:6px 11px;box-shadow:0 3px 12px rgba(0,0,0,.09);border:1.5px solid rgba(255,255,255,.7);}
.pb-jamo{width:clamp(26px,6.5vw,38px);height:clamp(26px,6.5vw,38px);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:clamp(.95rem,2.8vw,1.3rem);font-weight:900;
  border:2px dashed rgba(160,210,235,.7);background:linear-gradient(145deg,rgba(245,251,255,.95),rgba(225,240,255,.88));
  color:#9ab0c8;transition:all .3s cubic-bezier(.34,1.56,.64,1);}
.pb-jamo.done{border-color:var(--mint);background:linear-gradient(145deg,rgba(215,250,248,.97),rgba(195,238,235,.88));color:#1a8a80;}
.pb-jamo.current{border-color:#ffd93d;background:linear-gradient(145deg,#fffbe0,#fff3b0);color:#c08000;
  animation:pbCur .7s ease-in-out infinite alternate;}
@keyframes pbCur{from{transform:scale(1);}to{transform:scale(1.12);box-shadow:0 0 10px rgba(255,210,0,.6);}}
.pb-label{font-family:'Gaegu',cursive;font-size:.74rem;font-weight:700;color:#7a9ab8;letter-spacing:1px;}
.balloon{position:absolute;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;z-index:12;user-select:none;will-change:transform;touch-action:none;}
.balloon-body{border-radius:50% 50% 46% 46%;display:flex;align-items:center;justify-content:center;
  font-size:clamp(2rem,5.5vw,3rem);font-weight:900;color:#fff;
  text-shadow:0 2px 10px rgba(0,0,0,.4);position:relative;flex-shrink:0;
  transition:transform .12s cubic-bezier(.34,1.56,.64,1);}
.balloon-body::before{content:'';position:absolute;top:11%;left:17%;width:30%;height:24%;
  background:radial-gradient(ellipse,rgba(255,255,255,.7) 0%,rgba(255,255,255,0) 70%);
  border-radius:50%;transform:rotate(-30deg);pointer-events:none;}
.balloon-body::after{content:'';position:absolute;bottom:16%;right:14%;width:17%;height:13%;
  background:radial-gradient(ellipse,rgba(255,255,255,.38) 0%,rgba(255,255,255,0) 70%);
  border-radius:50%;pointer-events:none;}
.balloon-knot{clip-path:polygon(50% 0%,0% 100%,100% 100%);margin-top:-1px;flex-shrink:0;}
.balloon-string{width:2px;height:40px;background:linear-gradient(to bottom,rgba(80,80,80,.3),transparent);flex-shrink:0;}
@keyframes balloonFall{
  from{transform:translateY(-200px) translateX(var(--dx,0px)) rotate(var(--tilt,0deg));opacity:0;}
  6%{opacity:1;}
  to{transform:translateY(115vh) translateX(calc(var(--dx,0px)*-.4)) rotate(var(--tilt,0deg));opacity:.85;}}
.balloon.popping{animation:bPop .28s ease forwards!important;}
@keyframes bPop{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.6);opacity:.8;}100%{transform:scale(0);opacity:0;}}
.balloon.wrongpop{animation:bWrong .28s ease forwards!important;}
@keyframes bWrong{0%{filter:none;}50%{transform:scale(1.3);filter:brightness(.4) saturate(0);}100%{transform:scale(0);opacity:0;}}
.balloon-body.hint-active{animation:hintAct .45s cubic-bezier(.34,1.9,.64,1) infinite alternate!important;}
@keyframes hintAct{from{transform:scale(1);filter:brightness(1);}to{transform:scale(1.5);filter:brightness(1.3) drop-shadow(0 0 18px rgba(255,230,50,.9));}}
.pop-p{position:absolute;border-radius:50%;pointer-events:none;z-index:22;animation:pFly var(--dur,.8s) ease forwards;}
@keyframes pFly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx,0),var(--ty,0)) scale(0);opacity:0;}}
.float-text{position:absolute;font-family:'Gaegu',cursive;font-size:1.5rem;font-weight:700;
  pointer-events:none;z-index:30;white-space:nowrap;text-shadow:0 2px 8px rgba(0,0,0,.18);
  animation:ftUp 1.2s ease forwards;}
@keyframes ftUp{0%{opacity:1;transform:translateY(0) scale(1);}20%{transform:translateY(-20px) scale(1.3);}100%{opacity:0;transform:translateY(-95px) scale(.8);}}
.banner-base{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-family:'Gaegu',cursive;font-weight:700;color:#fff;text-align:center;z-index:45;pointer-events:none;
  padding:14px 30px;border-radius:20px;border:2px solid rgba(255,255,255,.38);backdrop-filter:blur(6px);}
.banner-base.show{animation:banPop 2.2s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes banPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}13%{transform:translate(-50%,-50%) scale(1.08);opacity:1;}19%{transform:translate(-50%,-50%) scale(1);opacity:1;}72%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{transform:translate(-50%,-50%) scale(.8);opacity:0;}}
#levelBanner{font-size:clamp(1.75rem,5.2vw,2.9rem);background:linear-gradient(135deg,rgba(88,173,255,.92),rgba(150,138,255,.92));
  box-shadow:0 7px 0 rgba(40,100,200,.33),0 12px 34px rgba(90,173,255,.42),inset 0 1px 0 rgba(255,255,255,.32);}
#failBanner{font-size:clamp(1.5rem,4.8vw,2.6rem);background:linear-gradient(135deg,rgba(220,60,60,.95),rgba(180,30,30,.95));
  box-shadow:0 7px 0 rgba(150,20,20,.45),0 12px 38px rgba(220,60,60,.5),inset 0 1px 0 rgba(255,255,255,.28);
  pointer-events:auto!important;cursor:pointer;}
#failBanner .tap-hint{display:block;font-size:clamp(.75rem,2.2vw,.95rem);opacity:.82;margin-top:6px;letter-spacing:1px;
  animation:tapBlink 1s ease-in-out infinite alternate;}
@keyframes tapBlink{from{opacity:.6}to{opacity:1}}
#failOverlay{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:44;display:none;cursor:pointer;}
#failOverlay.show{display:block;}
#charCompletePopup{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-family:'Gaegu',cursive;font-weight:700;color:#fff;text-align:center;z-index:46;pointer-events:none;
  background:linear-gradient(135deg,rgba(62,207,191,.93),rgba(30,160,150,.93));
  padding:14px 28px;border-radius:20px;border:2px solid rgba(255,255,255,.45);
  box-shadow:0 8px 0 rgba(20,130,122,.4),0 14px 36px rgba(62,207,191,.5),inset 0 1px 0 rgba(255,255,255,.35);
  backdrop-filter:blur(5px);white-space:nowrap;}
#charCompletePopup.show{animation:charPop 1.4s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes charPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}15%{transform:translate(-50%,-50%) scale(1.15);opacity:1;}22%{transform:translate(-50%,-50%) scale(1);opacity:1;}68%{transform:translate(-50%,-50%) scale(1);opacity:1;}100%{transform:translate(-50%,-50%) scale(.7) translateY(-30px);opacity:0;}}
#retrySuccessBanner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-family:'Gaegu',cursive;font-weight:700;color:#fff;text-align:center;z-index:47;pointer-events:none;
  background:linear-gradient(135deg,rgba(88,201,106,.94),rgba(40,160,60,.94));
  padding:18px 32px;border-radius:22px;border:2px solid rgba(255,255,255,.4);
  box-shadow:0 8px 0 rgba(30,140,50,.4),0 14px 36px rgba(88,201,106,.5),inset 0 1px 0 rgba(255,255,255,.35);
  backdrop-filter:blur(6px);}
#retrySuccessBanner.show{animation:banPop 2.5s cubic-bezier(.34,1.56,.64,1) forwards;}
#hintOverlay{display:none;position:absolute;top:55px;left:50%;transform:translateX(-50%);
  font-family:'Gaegu',cursive;font-size:.92rem;color:#e8a000;font-weight:700;
  background:rgba(255,248,200,.92);border-radius:10px;padding:5px 15px;z-index:17;
  box-shadow:0 3px 10px rgba(240,180,0,.38);border:2px solid rgba(255,210,0,.58);white-space:nowrap;pointer-events:none;}
.hint-balloon{position:absolute;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;z-index:16;user-select:none;animation:hintRise var(--spd,18s) linear forwards;}
.hint-body{border-radius:50% 50% 46% 46%;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;padding:10% 8% 16%;
  background:radial-gradient(circle at 34% 28%,#fffce8,#ffe600,#e8a000);
  flex-shrink:0;position:relative;overflow:hidden;
  animation:hintPulse .95s cubic-bezier(.34,1.56,.64,1) infinite alternate;}
.hint-body::before{content:'';position:absolute;top:8%;left:14%;width:34%;height:27%;
  background:radial-gradient(ellipse,rgba(255,255,255,.85) 0%,rgba(255,255,255,0) 70%);
  border-radius:50%;transform:rotate(-28deg);pointer-events:none;}
.hint-tag{font-family:'Gaegu',cursive;font-weight:700;color:#6a3000;letter-spacing:1.5px;line-height:1;text-shadow:0 1px 0 rgba(255,255,255,.65);}
.hint-word{font-family:'Gaegu',cursive;font-weight:700;color:#2a1000;line-height:1.1;text-align:center;text-shadow:0 2px 5px rgba(0,0,0,.2),0 1px 0 rgba(255,255,255,.48);}
.hint-knot{clip-path:polygon(50% 0%,0% 100%,100% 100%);background:#a07000;margin-top:-1px;flex-shrink:0;}
.hint-string{width:3px;height:52px;background:linear-gradient(to bottom,rgba(70,70,70,.28),transparent);flex-shrink:0;}
@keyframes hintRise{from{transform:translateY(120vh) rotate(var(--tilt,0deg));opacity:0;}8%{opacity:1;}to{transform:translateY(-260px) rotate(var(--tilt,0deg));opacity:.95;}}
@keyframes hintPulse{from{transform:scale(1);box-shadow:0 0 0 4px rgba(255,230,0,.42),0 12px 30px rgba(240,175,0,.6),0 5px 0 #a07000;}
  to{transform:scale(1.26);box-shadow:0 0 0 13px rgba(255,238,0,.68),0 20px 50px rgba(240,180,0,.98),0 5px 0 #a07000,0 0 44px rgba(255,242,0,.88);}}
.mini-balloon{position:absolute;z-index:30;cursor:pointer;display:flex;flex-direction:column;align-items:center;
  animation:miniRise var(--dur,6s) ease-out forwards,miniDrift calc(var(--dur,6s)*.55) ease-in-out infinite;}
.mini-body{border-radius:50% 50% 46% 46%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.32);position:relative;flex-shrink:0;}
.mini-body::before{content:'';position:absolute;top:12%;left:18%;width:28%;height:22%;
  background:radial-gradient(ellipse,rgba(255,255,255,.68) 0%,transparent 70%);border-radius:50%;transform:rotate(-28deg);}

const CH=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JU=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const JO=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function dChar(c){const code=c.charCodeAt(0)-0xAC00;if(code<0||code>11171)return[c];const j=code%28,u=((code-j)/28)%21,h=Math.floor((code-j)/28/21);const r=[CH[h],JU[u]];if(j>0)r.push(JO[j]);return r;}
function dWord(w){const r=[];for(const c of w)r.push(...dChar(c));return r;}
function jStart(w,ci){let n=0;for(let i=0;i<ci;i++)n+=dChar(w[i]).length;return n;}

function catKey(c){return'hb_'+c;}
function catBest(c){return parseInt(localStorage.getItem(catKey(c))||'0');}
function grpBest(cats){return cats.length?Math.min(...cats.map(catBest)):0;}
function saveSc(cats,sc){cats.forEach(c=>{if(sc>catBest(c))localStorage.setItem(catKey(c),String(sc));});}
function maxUnl(cats){const b=grpBest(cats);let lv=1;for(let i=1;i<=5;i++)if(b>=UNL[i])lv=i;return lv;}
function calcLv(wo){if(wo<2)return 1;if(wo<5)return 2;if(wo<8)return 3;if(wo<11)return 4;return 5;}

const DIFF={
  easy:  {speedMs:20000,rowSize:8, maxRows:2,correctPerRow:2},
  normal:{speedMs:15000,rowSize:10,maxRows:3,correctPerRow:2},
  hard:  {speedMs:10000,rowSize:12,maxRows:4,correctPerRow:2},
};
const SM=[1,1,.88,.70,.52,.35];
const PM=[1,1,.90,.72,.55,.38];
function lvSpd(){return Math.round(G.diff.speedMs*SM[Math.min(G.lv,5)]);}
function lvSpawn(){return Math.round(G.diff.spawnMs||(G.diff.speedMs*.08)*PM[Math.min(G.lv,5)]);}

  if(best>0){badge.style.display='inline-flex';document.getElementById('bestVal').textContent=best.toLocaleString();}
  else badge.style.display='none';
  for(let lv=1;lv<=5;lv++){
    const btn=document.createElement('button');btn.className='lv-btn';
    const unl=lv<=mu,req=UNL[lv];

      btn.classList.add('locked');

      btn.innerHTML=`<span class="lv-num">Lv.${lv}</span><span class="lv-stars">${LSTARS[lv]}</span><span class="lv-req">${lv===1?'기본':req.toLocaleString()+'점~'}</span>`;

function showScreen(name){
  ['startScreen','gameScreen','resultScreen'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById(name+'Screen').classList.remove('hidden');
  document.getElementById('pauseOverlay').classList.add('hidden');
  if(name!=='game')clearAll();
}
function goMenu(){G.over=true;retryWords=null;isRetryMode=false;clearAll();showScreen('start');}

function startGame(){
  let words;
  if(retryWords&&retryWords.length>0){words=shuffle([...retryWords]);isRetryMode=true;}
  else{words=shuffle([...selCats.flatMap(c=>CATS[c].words)]);isRetryMode=false;}
  const diff=DIFF[selDiff];
  const startLv=Math.max(1,Math.min(5,chosenLv));
  G={
    words,wIdx:0,score:Math.floor(UNL[startLv]*.5),
    lives:3,wordsOk:LV_BASE[startLv]||0,
    consWords:0,consWrong:0,totalCorrect:0,totalWrong:0,
    wrongWords:{},wordRows:0,rowActive:false,
    lv:startLv,diff,jamo:[],filled:[],entry:null,over:false,activeB:0
  };
  paused=false;hintJamo=null;
  document.body.classList.remove('level5');
  showScreen('game');
  renderLives();renderScore();renderSpeed();renderWrongDots();
  nextWord();
}

function nextWord(){
  if(G.wIdx>=G.words.length){
    if(isRetryMode){G.over=true;showResult();return;}
    G.words=shuffle([...G.words]);G.wIdx=0;
  }
  G.entry=G.words[G.wIdx++];
  G.jamo=dWord(G.entry.word);
  G.filled=new Array(G.jamo.length).fill(null);
  G.consWrong=0;G.wordRows=0;G.rowActive=false;
  clearBalloons();
  document.getElementById('targetImage').textContent=G.entry.emoji;
  const lbl=document.getElementById('wordLabel');if(lbl)lbl.textContent='';
  renderWord();renderDots();renderWrongDots();renderProgressBar();
  setTimeout(()=>{if(!G.over)launchRow();},300);
}

function clearBalloons(){if(spawnTmr){clearTimeout(spawnTmr);spawnTmr=null;}bEls.forEach(b=>b.remove());bEls=[];G.activeB=0;}
function clearHint(){
  if(hintTmr){clearTimeout(hintTmr);hintTmr=null;}
  if(hintEl){hintEl.remove();hintEl=null;}
  if(hintActTmr){clearTimeout(hintActTmr);hintActTmr=null;}
  hintJamo=null;
  document.querySelectorAll('.balloon-body.hint-active').forEach(b=>b.classList.remove('hint-active'));
  document.querySelectorAll('.dot.hint-pulse').forEach(d=>d.classList.remove('hint-pulse'));
  document.getElementById('hintOverlay').style.display='none';
}
function clearAll(){
  clearBalloons();clearHint();paused=false;
  document.body.classList.remove('level5');
  document.getElementById('pauseOverlay').classList.add('hidden');
  const ov=document.getElementById('failOverlay');if(ov)ov.classList.remove('show');
  const fb=document.getElementById('failBanner');if(fb)fb.classList.remove('show');
}

function renderWord(){
  const tw=document.getElementById('targetWord');tw.innerHTML='';
  [...G.entry.word].forEach((ch,ci)=>{
    const sl=document.createElement('div');sl.className='char-slot';sl.id='sl'+ci;
    const d=dChar(ch),si=jStart(G.entry.word,ci);
    const fl=G.filled.slice(si,si+d.length);
    if(fl.every(f=>f!==null)){sl.classList.add('complete');sl.textContent=ch;}
    else if(fl.some(f=>f!==null)){sl.classList.add('filled');}
    tw.appendChild(sl);
  });
  renderProgressBar();
}
function renderProgressBar(){
  const bar=document.getElementById('progressBarInner');if(!bar||!G.jamo)return;
  bar.innerHTML='';
  const ni=G.filled.indexOf(null);
  G.jamo.forEach((jamo,i)=>{
    const div=document.createElement('div');div.className='pb-jamo';
    if(G.filled[i]!==null){div.classList.add('done');div.textContent=G.filled[i];}
    else if(i===ni){div.classList.add('current');div.textContent=jamo;}
    else{div.textContent='?';}
    bar.appendChild(div);
  });
}

  const pd=document.getElementById('progressDots');pd.innerHTML='';

function setDot(i,on){const d=document.getElementById('dt'+i);if(d){on?d.classList.add('done'):d.classList.remove('done');}}

function launchRow(){
  if(G.over||paused)return;
  const ni=G.filled.indexOf(null);if(ni===-1)return;
  if(G.wordRows>=G.diff.maxRows){G.wordRows=0;loseLife();return;}
  G.wordRows++;G.rowActive=true;
  const isSecondRow=(G.wordRows>=2);
  const missingJamos=G.jamo.filter((_,i)=>G.filled[i]===null);
  const uniqueMissing=[...new Set(missingJamos)];
  const rsz=G.diff.rowSize;
  const rPool=['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅏ','ㅑ','ㅓ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ']
    .filter(j=>!uniqueMissing.includes(j));
  const wrongPool=shuffle([...rPool]);
  let row=[];
  const cnt=isSecondRow?3:2;
  uniqueMissing.forEach(j=>{for(let k=0;k<cnt;k++)row.push(j);});
  while(row.length<rsz)row.push(wrongPool[row.length%wrongPool.length]);
  row=shuffle(row.slice(0,rsz));
  row.forEach((jamo,idx)=>{setTimeout(()=>{if(G.over||paused)return;spawnOne(jamo);},idx*80);});
  const rowDur=lvSpd()+row.length*80+400;
  spawnTmr=setTimeout(()=>{
    if(G.over||paused)return;
    G.rowActive=false;
    const ni2=G.filled.indexOf(null);if(ni2===-1)return;
    setTimeout(()=>{if(!G.over&&!paused)launchRow();},200);
  },rowDur);
}

function togglePause(){
  const failOv=document.getElementById('failOverlay');
  if(failOv&&failOv.classList.contains('show'))return;
  paused=!paused;
  document.getElementById('pauseOverlay').classList.toggle('hidden',!paused);
  document.getElementById('pauseBtn').textContent=paused?'▶ 재생':'⏸ 정지';
  bEls.forEach(b=>b.style.animationPlayState=paused?'paused':'running');
  if(hintEl)hintEl.style.animationPlayState=paused?'paused':'running';
  if(!paused){if(spawnTmr){clearTimeout(spawnTmr);spawnTmr=null;}setTimeout(()=>{if(!paused&&!G.over)launchRow();},500);}
  else{if(spawnTmr){clearTimeout(spawnTmr);spawnTmr=null;}}
}

function spawnOne(jamo){
  const el=document.createElement('div');el.className='balloon';
  const st=BST[Math.floor(Math.random()*BST.length)];
  const tilt=(Math.random()-.5)*12,dx=(Math.random()-.5)*44;
  el.style.setProperty('--tilt',tilt+'deg');el.style.setProperty('--dx',dx+'px');
  const ga=document.getElementById('gameArea'),aW=ga.offsetWidth;
  const bW=Math.min(90,Math.max(62,aW*.13));
  el.style.left=(14+Math.random()*(aW-bW-28))+'px';
  el.style.top='0px';
  el.style.animation=`balloonFall ${lvSpd()}ms linear forwards`;
  el.style.animationPlayState='running';
  el.innerHTML=`<div class="balloon-body" style="width:${bW}px;height:${bW*1.22}px;background:${st.bg};box-shadow:inset -5px -9px 16px rgba(0,0,0,.17),inset 3px 4px 8px rgba(255,255,255,.24),0 9px 24px ${st.sh},0 4px 0 ${st.kn},0 3px 7px rgba(0,0,0,.1);">${jamo}</div><div class="balloon-knot" style="background:${st.kn};width:11px;height:14px;"></div><div class="balloon-string"></div>`;
  el.dataset.jamo=jamo;
  addDrag(el);
  el.addEventListener('click',()=>onBClick(el));
  ga.appendChild(el);bEls.push(el);G.activeB++;
  if(hintJamo&&jamo===hintJamo){const body=el.querySelector('.balloon-body');if(body)body.classList.add('hint-active');}
  el.addEventListener('animationend',()=>{
    if(!el.classList.contains('popping')&&!el.classList.contains('wrongpop')){
      const ni=G.filled.indexOf(null);
      if(ni!==-1&&G.jamo[ni]===jamo){
        showFT('💨',parseFloat(el.style.left)+bW/2,document.getElementById('gameArea').offsetHeight-60,'#ff8c42');
      }
    }
    el.remove();bEls=bEls.filter(b=>b!==el);G.activeB=Math.max(0,G.activeB-1);
  },{once:true});
}

function addDrag(el){
  let startX=0,dragging=false,isDragAction=false;
  const onStart=(e)=>{if(paused||G.over)return;const pt=e.touches?e.touches[0]:e;startX=pt.clientX;dragging=true;isDragAction=false;};
  const onMove=(e)=>{
    if(!dragging||paused||G.over)return;
    const pt=e.touches?e.touches[0]:e;const dx=pt.clientX-startX;
    if(Math.abs(dx)>6){
      isDragAction=true;startX=pt.clientX;
      const ga=document.getElementById('gameArea');const aW=ga.offsetWidth;
      const bW=parseFloat(el.querySelector('.balloon-body').style.width)||70;
      let newLeft=(parseFloat(el.style.left)||0)+dx;
      newLeft=Math.max(0,Math.min(aW-bW,newLeft));
      el.style.left=newLeft+'px';
      if(e.cancelable)e.preventDefault();
    }
  };
  const onEnd=(e)=>{if(isDragAction)e.stopPropagation();dragging=false;isDragAction=false;};
  el.addEventListener('mousedown',onStart,{passive:true});
  document.addEventListener('mousemove',onMove,{passive:false});
  document.addEventListener('mouseup',onEnd);
  el.addEventListener('touchstart',onStart,{passive:true});
  el.addEventListener('touchmove',onMove,{passive:false});
  el.addEventListener('touchend',onEnd,{passive:true});
}

function onBClick(el){
  if(paused||G.over)return;
  if(!bEls.includes(el))return;
  const cj=el.dataset.jamo;
  const ni=G.filled.indexOf(null);
  const nj=ni!==-1?G.jamo[ni]:null;
  const correct=(nj!==null&&cj===nj);
  const rect=el.getBoundingClientRect(),gr=document.getElementById('gameArea').getBoundingClientRect();
  const cx=rect.left-gr.left+rect.width/2,cy=rect.top-gr.top+rect.height/2;
  bEls=bEls.filter(b=>b!==el);G.activeB=Math.max(0,G.activeB-1);
  if(correct){
    el.style.animationPlayState='running';el.classList.add('popping');
    popP(cx,cy,true);sndOk();
    setTimeout(()=>speakCheer(),150);
    G.filled[ni]=cj;G.totalCorrect++;G.score+=10;
    showFT('+10',cx,cy,'#58c96a');setDot(ni,true);renderWord();renderScore();
    el.addEventListener('animationend',()=>el.remove(),{once:true});
    checkCharComplete(ni);checkWord();checkLv();
  } else {
    el.style.animationPlayState='running';el.classList.add('wrongpop');
    popP(cx,cy,false);sndBad();
    G.totalWrong++;G.consWrong++;
    showFT('✕',cx,cy,'#ff5e5e');renderWrongDots();
    const limit=WRONG_LIMIT[Math.min(G.lv,5)];
    if(G.consWrong>=limit){G.consWrong=0;loseLife();}
    el.addEventListener('animationend',()=>el.remove(),{once:true});
  }
}

function checkCharComplete(filledIdx){
  const word=G.entry.word;let pos=0;
  for(let ci=0;ci<word.length;ci++){
    const d=dChar(word[ci]);const sliceEnd=pos+d.length;
    if(filledIdx>=pos&&filledIdx<sliceEnd){
      const filled=G.filled.slice(pos,sliceEnd);
      if(filled.every(f=>f!==null)&&!G.filled.every(f=>f!==null)){
        const popup=document.getElementById('charCompletePopup');
        popup.innerHTML=`<div style="font-size:clamp(2.2rem,7vw,3.2rem);line-height:1;">${G.entry.emoji} <span style="font-size:clamp(2.5rem,8vw,3.8rem);letter-spacing:3px;">${word[ci]}</span></div><div style="font-size:clamp(.85rem,2.5vw,1.05rem);margin-top:4px;opacity:.88;">완성! 계속 해봐요 👍</div>`;
        popup.classList.remove('show');void popup.offsetWidth;popup.classList.add('show');
      }break;
    }pos=sliceEnd;
  }
}

function checkWord(){
  if(!G.filled.every(f=>f!==null))return;
  G.wordsOk++;G.consWords++;G.score+=50;renderScore();
  if(G.consWords%3===0){
    G.lives=Math.min(G.lives+1,7);renderLives();
    const hs=document.querySelectorAll('.heart'),last=hs[hs.length-1];
    if(last){last.classList.remove('pulse');void last.offsetWidth;last.classList.add('pulse');}
    sndHeart();showFT('❤️ +1',document.getElementById('gameArea').offsetWidth/2,78,'#ff5e5e');
  }
  sndWord();launchFW(3);
  if(spawnTmr){clearTimeout(spawnTmr);spawnTmr=null;}
  clearBalloons();clearHint();G.wordRows=0;G.rowActive=false;
  if(isRetryMode&&G.wIdx>=G.words.length){G.over=true;setTimeout(()=>showResult(),2000);return;}
  setTimeout(()=>{if(!G.over)nextWord();},2000);
}

function checkLv(){
  const newLv=Math.max(calcLv(G.wordsOk),G.lv);
  if(newLv<=G.lv)return;
  G.lv=newLv;renderSpeed();sndLv();launchFW(3);
  if(G.lv>=5)document.body.classList.add('level5');
  else document.body.classList.remove('level5');
  if(spawnTmr){clearTimeout(spawnTmr);spawnTmr=null;}
  const bn=document.getElementById('levelBanner');
  bn.textContent='🎉 레벨 '+G.lv+(G.lv>=5?' 🔥 MAX':'')+'!';
  bn.classList.remove('show');void bn.offsetWidth;bn.classList.add('show');
  scheduleHint();
}

function loseLife(){
  G.lives--;renderLives();
  const word=G.entry.word;
  G.wrongWords[word]=(G.wrongWords[word]||0)+1;
  clearBalloons();clearHint();G.consWrong=0;sndFail();
  if(G.lives<=0){
    G.over=true;showFailBanner(true,()=>showResult());
  } else {
    showFailBanner(false,()=>{if(!G.over)nextWord();});
  }
}

function showFailBanner(isGameOver,onDismiss){
  const ov=document.getElementById('failOverlay');ov.classList.add('show');
  const fb=document.getElementById('failBanner');
  const msg=isGameOver?'😢 게임 오버!<br><span class="tap-hint">화면을 탭해서 결과 보기</span>':FAIL_MSG[Math.floor(Math.random()*FAIL_MSG.length)]+'<br><span class="tap-hint">화면을 탭해서 계속하기 ▶</span>';
  fb.innerHTML=msg;fb.classList.remove('show');void fb.offsetWidth;fb.classList.add('show');
  function dismiss(){
    ov.classList.remove('show');fb.classList.remove('show');
    ov.removeEventListener('click',dismiss);fb.removeEventListener('click',dismiss);
    setTimeout(onDismiss,200);
  }
  ov.addEventListener('click',dismiss);fb.addEventListener('click',dismiss);
  setTimeout(()=>{if(ov.classList.contains('show'))dismiss();},isGameOver?5000:3500);
}

function showFT(txt,x,y,col){const el=document.createElement('div');el.className='float-text';el.textContent=txt;el.style.left=x+'px';el.style.top=y+'px';el.style.color=col;document.getElementById('gameArea').appendChild(el);el.addEventListener('animationend',()=>el.remove(),{once:true});}
function popP(cx,cy,ok){
  const ga=document.getElementById('gameArea');
  const cols=ok?['#58c96a','#ffd93d','#3ecfbf','#85e895','#ffee90']:['#ff5e5e','#ff8c42','#ffb0b0'];
  for(let i=0;i<12;i++){const p=document.createElement('div');p.className='pop-p';const sz=5+Math.random()*8,ang=Math.random()*Math.PI*2,dist=44+Math.random()*68,dur=.44+Math.random()*.5;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;background:${cols[Math.floor(Math.random()*cols.length)]};--tx:${Math.cos(ang)*dist}px;--ty:${Math.sin(ang)*dist-26}px;--dur:${dur}s;box-shadow:0 2px 5px rgba(0,0,0,.13);`;
    ga.appendChild(p);p.addEventListener('animationend',()=>p.remove(),{once:true});}
}

function scheduleHint(){
  clearHint();if(G.lv<4||G.over)return;
  const delay=(12+Math.random()*8)*1000;
  hintTmr=setTimeout(()=>{if(!paused&&!G.over)spawnHint();},delay);
}
function spawnHint(){
  if(G.over||paused)return;clearHint();
  const ni=G.filled.indexOf(null);if(ni===-1)return;
  const nj=G.jamo[ni],word=G.entry.word;
  const ga=document.getElementById('gameArea'),aW=ga.offsetWidth;
  const bW=Math.min(190,Math.max(135,aW*.265));
  const xPos=aW/2-bW/2+(Math.random()-.5)*aW*.17;
  const spd=Math.max(lvSpd()*1.7,18000);
  const el=document.createElement('div');el.className='hint-balloon';
  el.style.setProperty('--tilt',((Math.random()-.5)*4)+'deg');
  el.style.setProperty('--spd',spd+'ms');
  el.style.left=xPos+'px';el.style.bottom='0px';el.style.position='absolute';
  el.innerHTML=`<div class="hint-body" style="width:${bW}px;height:${bW*1.2}px;"><div class="hint-tag" style="font-size:${bW*.09}px;">💡 힌트</div><div class="hint-word" style="font-size:${bW*.27}px;">${word}</div><div style="font-size:${bW*.088}px;color:#7a4000;font-family:'Gaegu',cursive;font-weight:700;background:rgba(255,255,255,.44);border-radius:7px;padding:2px 7px;margin-top:2px;">터치!</div></div><div class="hint-knot" style="width:${bW*.11}px;height:${bW*.13}px;"></div><div class="hint-string" style="height:${bW*.37}px;"></div>`;
  el.addEventListener('click',()=>onHintClick(el,nj,word));
  el.addEventListener('touchend',(e)=>{e.preventDefault();onHintClick(el,nj,word);},{passive:false});
  ga.appendChild(el);hintEl=el;
  document.getElementById('hintOverlay').style.display='block';
  setTimeout(()=>document.getElementById('hintOverlay').style.display='none',3000);
  el.addEventListener('animationend',()=>{if(hintEl===el)hintEl=null;el.remove();if(!G.over)scheduleHint();},{once:true});
}
function onHintClick(el,nj,word){
  if(paused||G.over)return;
  const rect=el.getBoundingClientRect(),gr=document.getElementById('gameArea').getBoundingClientRect();
  const cx=rect.left-gr.left+rect.width/2,cy=rect.top-gr.top+rect.height/2;
  if(hintEl===el)hintEl=null;el.remove();clearHint();
  popP(cx,cy,true);sndHeart();showFT('💡 '+word,cx,cy-26,'#e8a000');
  spawnMinis(cx,cy,word);activateHintPulse(nj);scheduleHint();
}
function spawnMinis(cx,cy,word){
  const ga=document.getElementById('gameArea');
  const MS=[{bg:'radial-gradient(circle at 34% 30%,#ffe066,#e0a800)',sh:'rgba(224,168,0,.52)'},{bg:'radial-gradient(circle at 34% 30%,#80e890,#24a036)',sh:'rgba(40,168,58,.42)'},{bg:'radial-gradient(circle at 34% 30%,#7ec8ff,#2482d8)',sh:'rgba(36,130,216,.42)'},{bg:'radial-gradient(circle at 34% 30%,#c8b2ff,#7048e0)',sh:'rgba(112,72,224,.42)'},{bg:'radial-gradient(circle at 34% 30%,#ff9090,#d82828)',sh:'rgba(216,40,40,.42)'}];
  for(let i=0;i<5;i++){
    const st=MS[i%5],mW=55,sx=(Math.random()-.5)*148,fy=-(238+Math.random()*138),rot=(Math.random()-.5)*26,dur=6+Math.random()*4,d1=(Math.random()-.5)*24,delay=i*.12;
    const mini=document.createElement('div');mini.className='mini-balloon';
    mini.style.cssText=`left:${cx-mW/2+(Math.random()-.5)*70}px;top:${cy-mW*.46}px;--sx:${sx}px;--fy:${fy}px;--rot:${rot}deg;--dur:${dur}s;--d1:${d1}px;animation-delay:${delay}s;`;
    const fs=Math.max(8,mW*.26);
    mini.innerHTML=`<div class="mini-body" style="width:${mW}px;height:${mW*1.18}px;background:${st.bg};box-shadow:inset -3px -5px 10px rgba(0,0,0,.17),inset 2px 2px 5px rgba(255,255,255,.32),0 5px 14px ${st.sh};"><span style="font-size:${fs*.65}px;font-family:'Gaegu',cursive;font-weight:700;color:rgba(255,255,255,.88);line-height:1;">힌트</span><span style="font-size:${fs}px;font-family:'Gaegu',cursive;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.32);line-height:1;">${word}</span></div><div class="mini-string"></div>`;
    mini.addEventListener('click',(e)=>{e.stopPropagation();const b=mini.querySelector('.mini-body');if(b){b.style.transition='transform .1s';b.style.transform='rotate(17deg) scale(1.13)';setTimeout(()=>{b.style.transform='rotate(-9deg)';},88);setTimeout(()=>b.style.transform='',195);}tone(340,'sawtooth',.06,.12);setTimeout(()=>tone(290,'sawtooth',.07,.14),52);});
    ga.appendChild(mini);
    setTimeout(()=>{mini.style.transition='opacity 1.4s';mini.style.opacity='0';setTimeout(()=>mini.remove(),1400);},7500+i*520);
  }
}
function activateHintPulse(jamo){
  if(hintActTmr){clearTimeout(hintActTmr);hintActTmr=null;}
  document.querySelectorAll('.balloon-body.hint-active').forEach(b=>b.classList.remove('hint-active'));
  document.querySelectorAll('.dot.hint-pulse').forEach(d=>d.classList.remove('hint-pulse'));
  hintJamo=jamo;
  const ni=G.filled.indexOf(null);
  if(ni!==-1){const dot=document.getElementById('dt'+ni);if(dot)dot.classList.add('hint-pulse');}
  bEls.forEach(b=>{if(b.dataset.jamo===jamo){const body=b.querySelector('.balloon-body');if(body)body.classList.add('hint-active');}});
  hintActTmr=setTimeout(()=>{document.querySelectorAll('.balloon-body.hint-active').forEach(b=>b.classList.remove('hint-active'));document.querySelectorAll('.dot.hint-pulse').forEach(d=>d.classList.remove('hint-pulse'));hintJamo=null;hintActTmr=null;},3500);
}

function showResult(){
  showScreen('result');
  const prevMu=maxUnl(selCats);saveSc(selCats,G.score);const newMu=maxUnl(selCats);
  document.getElementById('rScore').textContent=G.score.toLocaleString();
  document.getElementById('rWords').textContent=G.wordsOk;
  document.getElementById('rLevel').textContent=G.lv;
  const ci=document.getElementById('rCorrectItem'),cn=document.getElementById('rCorrect'),cl=document.getElementById('rCorrectLbl');
  if(G.totalWrong>0){ci.classList.add('wrong-stat');cn.textContent=G.totalWrong;cl.textContent='틀린 횟수';}
  else{ci.classList.remove('wrong-stat');cn.textContent=G.totalCorrect;cl.textContent='맞은 글자';}
  const allDone=Object.keys(G.wrongWords).length===0;
  let emoji,title;
  if(isRetryMode&&allDone){emoji='🏆';title=RETRY_SUCCESS_MSG[Math.floor(Math.random()*RETRY_SUCCESS_MSG.length)];
    const rsb=document.getElementById('retrySuccessBanner');rsb.innerHTML='🎊 재도전 성공!<br><span style="font-size:.7em;opacity:.88;">틀린 단어를 모두 맞췄어요!</span>';rsb.classList.remove('show');void rsb.offsetWidth;rsb.classList.add('show');launchFW(5);sndLv();}
  else if(isRetryMode&&!allDone){emoji='💪';title='조금 더 연습해봐요!';}
  else if(G.lv>=5&&allDone&&G.wordsOk>=11){emoji='🏆';title='레벨5 완벽 클리어! 천재예요!';}
  else if(G.lv>=5){emoji='🥇';title='레벨5 도달! 정말 대단해요!';}
  else if(G.lv>=4&&allDone){emoji='🎖️';title='레벨4 완주! 훌륭해요!';}
  else if(G.lv>=4){emoji='🎉';title='레벨4까지 왔어요! 잘했어요!';}
  else if(G.lv>=3){emoji='😊';title='레벨3까지 왔네요! 좋아요!';}
  else if(G.wordsOk>=4){emoji='😄';title='잘하고 있어요! 계속 도전해봐요!';}
  else if(G.wordsOk>=1){emoji='🌱';title='조금씩 늘고 있어요! 파이팅!';}
  else{emoji='💪';title='다시 도전해봐요!';}
  document.getElementById('rEmoji').textContent=emoji;document.getElementById('rTitle').textContent=title;
  const cb=grpBest(selCats);
  document.getElementById('rCatInfo').innerHTML=`${selCats.map(c=>CATS[c].icon+c).join(' ')}<br><span style="color:#e8a000;font-size:.76rem;">이 카테고리 최고: ${cb.toLocaleString()}점 ${LSTARS[newMu]}</span>`;
  const wrongEntries=Object.entries(G.wrongWords);
  const sec=document.getElementById('wrongWordsSec');const grid=document.getElementById('wrongWordGrid');grid.innerHTML='';
  if(wrongEntries.length>0){
    sec.style.display='block';
    wrongEntries.sort((a,b)=>b[1]-a[1]).forEach(([word,cnt])=>{
      const entry=G.words.find(w=>w.word===word)||{word,emoji:'❓'};
      const chip=document.createElement('div');chip.className='wrong-word-chip';
      chip.innerHTML=`<span style="font-size:1.2rem;">${entry.emoji}</span><span>${word}</span><span style="font-size:.65rem;color:#e06060;background:rgba(220,80,80,.12);border-radius:8px;padding:1px 6px;">${cnt}번</span>`;
      chip.addEventListener('click',()=>{retryWords=[entry];startGame();});
      grid.appendChild(chip);
    });
    const retryAllWords=wrongEntries.map(([word])=>G.words.find(w=>w.word===word)||{word,emoji:'❓'});
    let retryAllBtn=document.getElementById('retryAllBtn');
    if(!retryAllBtn){retryAllBtn=document.createElement('button');retryAllBtn.id='retryAllBtn';retryAllBtn.className='rbtn rbtn-retry';document.getElementById('resBtns').insertBefore(retryAllBtn,document.getElementById('resBtns').firstChild);}
    retryAllBtn.textContent=`🔥 틀린 단어 ${wrongEntries.length}개 재도전`;
    retryAllBtn.onclick=()=>{retryWords=retryAllWords;startGame();};
    retryAllBtn.style.display='';
  } else {sec.style.display='none';const rb=document.getElementById('retryAllBtn');if(rb)rb.style.display='none';}
  document.getElementById('replayBtn').onclick=()=>{retryWords=null;showScreen('start');};
  const notice=document.getElementById('unlockNotice');
  if(newMu>prevMu){notice.style.display='block';notice.className='unlock-notice';notice.innerHTML=`🎉 레벨 ${newMu} 해금!<br><span style="font-size:.82rem;">이제 레벨 ${newMu}부터 시작 가능!</span>`;launchFW(5);sndLv();}
  else{notice.style.display='none';if(G.wordsOk>=2)launchFW(4);}
  if(G.wordsOk>=2&&!isRetryMode)sndWord();
  renderLvBtns();
}

const fwC=document.getElementById('fwCanvas');
const fwX=fwC.getContext('2d');
let fwP=[],fwR=null;
function resizeFW(){fwC.width=window.innerWidth;fwC.height=window.innerHeight;}
window.addEventListener('resize',resizeFW);resizeFW();
function launchFW(n=1){
  sndFw();
  const cols=['#ff5e5e','#ffd93d','#58c96a','#5aadff','#9b8ffd','#ff85e0','#3ecfbf','#ff8c42'];
  for(let ci=0;ci<n;ci++){
    setTimeout(()=>{
      if(ci>0)sndFw();
      const cx=window.innerWidth*.14+Math.random()*window.innerWidth*.72;
      const cy=window.innerHeight*.07+Math.random()*window.innerHeight*.33;
      for(let i=0;i<80;i++){const ang=(Math.PI*2*i)/80+(Math.random()-.5)*.13,spd=2+Math.random()*7;fwP.push({x:cx,y:cy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,color:cols[i%cols.length],size:2+Math.random()*5,trail:[],type:'spark'});}
      for(let i=0;i<18;i++){const ang=Math.random()*Math.PI*2,spd=1+Math.random()*4;fwP.push({x:cx,y:cy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1,life:1,color:'#fff',size:3+Math.random()*4,type:'star'});}
    },ci*320);
  }
  if(!fwR)animFW();
}
function animFW(){
  fwX.clearRect(0,0,fwC.width,fwC.height);fwP=fwP.filter(p=>p.life>0&&p.size>0);
  fwP.forEach(p=>{
    if(p.trail){p.trail.push({x:p.x,y:p.y,l:p.life});if(p.trail.length>6)p.trail.shift();}
    p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.vx*=.97;p.vy*=.97;p.life-=.016;
    if(p.trail)p.trail.forEach((t,i)=>{fwX.globalAlpha=t.l*(i/p.trail.length)*.38;fwX.fillStyle=p.color;fwX.beginPath();fwX.arc(t.x,t.y,Math.max(0,p.size*.5*(i/p.trail.length)),0,Math.PI*2);fwX.fill();});
    fwX.globalAlpha=p.life*(p.type==='star'?Math.abs(Math.sin(p.life*20)):1);
    fwX.fillStyle=p.color;fwX.shadowColor=p.color;fwX.shadowBlur=p.type==='star'?12:6;
    fwX.beginPath();fwX.arc(p.x,p.y,Math.max(0,p.size*p.life),0,Math.PI*2);fwX.fill();fwX.shadowBlur=0;
  });
  fwX.globalAlpha=1;
  if(fwP.length>0)fwR=requestAnimationFrame(animFW);
  else{fwR=null;fwX.clearRect(0,0,fwC.width,fwC.height);}
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
</script>
